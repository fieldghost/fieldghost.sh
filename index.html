<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fieldghost - Main</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div id="main-body">
    <div class="navigation">
        <a href="/" class="active">fieldghost::main</a>
        <a href="/code">fieldghost::code</a>
        <a href="/media">fieldghost::media</a>
        <a href="/charity">fieldghost::charity</a>
        <a href="/about">fieldghost::about</a>
        
        <button id="theme-toggle" class="theme-switch">Initialize Ghost</button>
    </div>

      <div class="container">
        <h1>Welcome to main.</h1>
        <p>The core system is online.</p>
      </div>
    
  </div>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const body = document.body;

    // Check if user has a saved preference
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'ghost') {
      body.classList.add('ghost-mode');
      toggleBtn.textContent = 'Return to Terminal';
    }

    // Toggle event listener
    toggleBtn.addEventListener('click', () => {
      body.classList.toggle('ghost-mode');
      
      if (body.classList.contains('ghost-mode')) {
        localStorage.setItem('theme', 'ghost');
        toggleBtn.textContent = 'Return to Terminal';
      } else {
        localStorage.setItem('theme', 'terminal');
        toggleBtn.textContent = 'Initialize Ghost';
      }
    });
  </script>
</body>
</html>
